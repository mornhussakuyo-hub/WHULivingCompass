<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WHU Living Compass - 武大生活导航，汇集校内门户、实用工具与常用网址。"
    />
    <title>WHU Living Compass</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script defer src="./js/app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="WHU Living Compass 首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M12 3.5 20 8v8l-8 4.5L4 16V8l8-4.5Z" />
              <path d="M8.5 9.5 12 7.6l3.5 1.9v5L12 16.4l-3.5-1.9v-5Z" />
            </svg>
          </span>
          <span>
            <span class="brand-title">WHU Living Compass</span>
            <span class="brand-subtitle">武大生活导航</span>
          </span>
        </a>

        <div class="topbar-actions">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.35-4.35" />
              <circle cx="11" cy="11" r="7" />
            </svg>
            <input id="siteSearch" type="search" placeholder="搜索名称、简介或标签" autocomplete="off" />
          </div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换夜间模式">
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2.2M12 19.8V22M4.93 4.93l1.56 1.56M17.51 17.51l1.56 1.56M2 12h2.2M19.8 12H22M4.93 19.07l1.56-1.56M17.51 6.49l1.56-1.56" />
            </svg>
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5 7 7 0 1 0 20.5 14.5Z" />
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar" aria-label="网站分类">
          <div class="sidebar-head">
            <span class="sidebar-label">分类</span>
            <span class="category-count" id="categoryCount">0</span>
          </div>
          <nav class="category-nav" id="categoryNav"></nav>
        </aside>

        <section class="content-area" aria-live="polite">
          <div class="content-head">
            <div>
              <p class="section-kicker">Navigation</p>
              <h1 id="categoryTitle">校内信息门户</h1>
            </div>
            <span class="result-count" id="resultCount">0 个网站</span>
          </div>
          <div class="site-grid" id="siteGrid"></div>
          <div class="empty-state" id="emptyState" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" />
              <path d="M8 9h8M8 13h5" />
            </svg>
            <p>没有匹配的网站</p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
